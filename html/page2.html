<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Thông tin cá nhân</title>
		<meta charset="utf-8">
		<link rel="stylesheet" href="../css/style2.css">
	</head>
	
	<body>
		<div class="container">
			<form id = "frmLogin">
				<h3>Đăng nhập hệ thống</h3>
				<div class = "from-group">
					<label for = "txtUsername">Tên đăng nhập: </label>
					<input class = "form-control" type = "text" id = "txtUsername" placeholder="Nhập tên đăng nhập" (theloc)>
				</div>	
				<div class = "from-group">
					<label for = "txtPassword">Nhập mật khẩu: </label>
					<input class = "form-control" type = "password" id = "txtPassword" placeholder="Nhập mật khẩu">
				</div>
				<input type = "submit" name = "sbLogin" value="Đăng nhập">
				<input type = "reset" name = "rsCancel" value="Hủy bỏ">
			</form>
		</div>	
	</body>
</html>

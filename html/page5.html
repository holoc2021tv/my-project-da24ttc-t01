<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Thiết kế web với html, css</title>
		<meta charset="utf-8">
		<link rel="stylesheet" href="../css/style5.css">
	</head>
	
		<body>
		<div class="container">
		<form id = "frmInBangCC">
				<h2>In Bảng cửu chương</h2>
					<label for="number">Nhập số: </label>
					<input type="number" id="number" placeholder="Nhập bản cửu chương cần tìm">
                    <button type="button" onclick="inBCC()">In</button>
        <div id="kq">
        </div>
        </form>

         <script>
                function inBCC(){
                const myfrm = document.forms['frmInBangCC'];
                const myTextfield = myfrm.elements[0];
                let num = parseInt(document.getElementById("number").value);
                let kq="";
                for(let i=1; i<=10; i++)
            {
                kq += num + " x " + i + " = " + (num * i) + "<br>";
            }
            document.getElementById("kq").innerHTML=kq;
        }
            </script>	
	</body>
</html>
